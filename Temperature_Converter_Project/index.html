<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Temperature Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <h1>
        <i class="fa-solid fa-temperature-half"></i> Temperature Converter
      </h1>
      <p>Convert between Celsius, Fahrenheit and Kelvin.</p>
      <input id="temp" type="number" placeholder="Enter value" />
      <div class="row">
        <select id="from">
          <option>Celsius</option>
          <option>Fahrenheit</option>
          <option>Kelvin</option>
        </select>
        <button id="swap"><i class="fa-solid fa-right-left"></i></button>
        <select id="to">
          <option>Fahrenheit</option>
          <option>Celsius</option>
          <option>Kelvin</option>
        </select>
      </div>
      <div class="buttons">
        <button id="convert">Convert</button>
        <button id="clear">Clear</button>
      </div>
      <div id="result" class="result">Result will appear here</div>
      <h3>Recent</h3>
      <ul id="history"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
